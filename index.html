<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers" id="lotto-numbers">
            
        </div>
        <button id="generator-btn">Generate Numbers</button>

        <div class="contact-form">
            <hr>
            <h3>Business Partnership Inquiry</h3>
            <form action="https://formspree.io/f/xeepdkgv" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
